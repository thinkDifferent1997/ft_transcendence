# ============================================================
#   ft_transcendence — DEV reverse proxy
#
#   Same shape as nginx.conf, but proxies / to the Vite dev
#   server (frontend:5173) instead of the production nginx
#   serving static files (frontend:80).
#
#   Also forwards Vite's HMR WebSocket on /  so hot reload
#   works through HTTPS at https://localhost.
# ============================================================

upstream frontend_dev_upstream {
    server frontend:5173;
}

upstream backend_upstream {
    server backend:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 10M;

    # ---------- API ----------
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---------- WebSockets (app) ----------
    location /ws/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- Frontend (Vite dev server) ----------
    # The Upgrade headers here are what makes Vite's HMR
    # WebSocket reach the dev server through nginx.
    location / {
        proxy_pass         http://frontend_dev_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
