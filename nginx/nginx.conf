# ============================================================
#   ft_transcendence — main reverse proxy
#
#   This file is copied into the nginx image at build time
#   (see nginx/Dockerfile). Validate locally with:
#     docker compose exec nginx nginx -t
# ============================================================

# Upstreams (Docker DNS resolves these to container IPs)
upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend:3000;
}

# Map HTTP `Upgrade` header to a Connection value.
# Needed so WebSocket clients negotiate correctly without
# breaking regular HTTP keep-alive.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    # ---------- TLS ----------
    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ---------- Basic security headers ----------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Reasonable body size for avatars and file uploads later on
    client_max_body_size 10M;

    # ---------- API ----------
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---------- WebSockets ----------
    location /ws/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long-lived connections — quiz rooms stay open
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- Frontend (catch-all) ----------
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
