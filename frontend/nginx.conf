# ============================================================
#   Frontend nginx — serves the built Vite SPA
#
#   Sits behind the main reverse proxy. Only listens on 80
#   inside the Docker network.
# ============================================================

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths return index.html so the
    # client-side router (React Router etc.) handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset filenames from Vite are safe to cache forever
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html — it references the hashed assets
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
