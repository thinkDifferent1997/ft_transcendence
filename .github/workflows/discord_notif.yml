name: Discord notification

on:
  push:
    branches:
      - main

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"🚀 Nouveau commit push sur main par **${{ github.actor }}**\nCommit: ${{ github.sha }}\nMessage: ${{ github.event.head_commit.message }}\"}" \
          "${{ secrets.DISCORD_WEBHOOK_URL }}"
